  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080a; --surface: #111114; --surface-2: #19191d; --surface-3: #222226;
      --border: rgba(255,255,255,0.06); --border-light: rgba(255,255,255,0.1);

      --accent-warmup: #fb7185; --accent-warmup-dim: rgba(251,113,133,0.1); --accent-warmup-glow: rgba(251,113,133,0.3);

    }

    body::after { content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 128px 128px; }
    body::before { content: ''; position: fixed; top: -120px; left: 50%; transform: translateX(-50%); width: 600px; height: 300px; background: radial-gradient(ellipse, rgba(245,158,11,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }

    .avatar-circle:active { transform: scale(0.95); }

    .avatar-circle .avatar-placeholder { color: var(--text-muted); font-size: 20px; line-height: 1; }

    #avatarInput { display: none; }
    .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(8,8,10,0.82); backdrop-filter: blur(24px) saturate(1.6); -webkit-backdrop-filter: blur(24px) saturate(1.6); padding: 20px 0 16px; border-bottom: 1px solid var(--border); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }

    .progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent-lift), var(--green)); transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); width: 0%; position: relative; }
    .progress-fill::after { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green-glow); opacity: 0; transition: opacity 0.3s; }

    .week-goal-icon.fat { background: var(--accent-warmup-dim); }
    .week-goal-icon.hiit { background: var(--accent-hiit-dim); }
    .week-goal-text { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-dim); line-height: 1.3; }
    .week-goal-text strong { color: var(--text); font-weight: 700; }

    .elbow-alert strong { color: #ef4444; }
    .elbow-alert em { color: var(--text); font-style: normal; font-weight: 600; }
    .day-switcher { display: flex; gap: 6px; padding: 20px 0 12px; overflow-x: auto; scrollbar-width: none; }
    .day-switcher::-webkit-scrollbar { display: none; }
    .day-btn { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; -webkit-appearance: none; position: relative; overflow: hidden; }
    .day-btn::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 0%, var(--accent-lift-dim) 0%, transparent 70%); opacity: 0; transition: opacity 0.2s; }
    .day-btn .day-num { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--text-dim); position: relative; }
    .day-btn.active { background: var(--surface-2); border-color: rgba(245,158,11,0.3); color: var(--accent-lift); box-shadow: 0 0 24px rgba(245,158,11,0.08), inset 0 1px 0 rgba(245,158,11,0.1); }
    .day-btn.active::before { opacity: 1; }
    .day-btn.active .day-num { color: var(--accent-lift); }
    .day-btn.rest { opacity: 0.3; cursor: default; }
    .day-btn.completed-day::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green-glow); margin-top: 2px; }
    .block { margin-top: 28px; }
    .initial-load .block { animation: blockReveal 0.5s cubic-bezier(0.4, 0, 0.2, 1) both; }
    .initial-load .block:nth-child(2) { animation-delay: 0.08s; }
    .initial-load .block:nth-child(3) { animation-delay: 0.16s; }
    .initial-load .block:nth-child(4) { animation-delay: 0.24s; }
    .initial-load .block:nth-child(5) { animation-delay: 0.32s; }
    .initial-load .block:nth-child(6) { animation-delay: 0.40s; }
    .initial-load .block:nth-child(7) { animation-delay: 0.48s; }
    .initial-load .block:nth-child(8) { animation-delay: 0.56s; }
    @keyframes blockReveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .block-info { display: flex; align-items: center; gap: 10px; }
    .block-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .block--warmup .block-dot { background: var(--accent-warmup); box-shadow: 0 0 10px var(--accent-warmup-glow); }
    .block--lift .block-dot { background: var(--accent-lift); box-shadow: 0 0 10px var(--accent-lift-glow); }
    .block--cardio .block-dot { background: var(--accent-cardio); box-shadow: 0 0 10px var(--accent-cardio-glow); }
    .block--hiit .block-dot { background: var(--accent-hiit); box-shadow: 0 0 10px var(--accent-hiit-glow); }
    .block--solo .block-dot { background: var(--accent-lift); box-shadow: 0 0 10px var(--accent-lift-glow); }
    .block-name { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .block--warmup .block-name { color: var(--accent-warmup); }
    .block--lift .block-name { color: var(--accent-lift); }
    .block--cardio .block-name { color: var(--accent-cardio); }
    .block--hiit .block-name { color: var(--accent-hiit); }
    .block--solo .block-name { color: var(--accent-lift); }
    .block-subtitle { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 2px; }
    .block-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; letter-spacing: 0.2px; }
    .block-progress { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--text-muted); background: var(--surface-2); padding: 5px 12px; border-radius: 100px; letter-spacing: 0.5px; transition: all 0.3s; }
    .block-progress.done { background: var(--green-dim); color: var(--green); box-shadow: 0 0 12px rgba(52,211,153,0.15); }
    .exercise { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; transition: all 0.25s; }
    .exercise:active { transform: scale(0.985); }
    .exercise.completed { border-color: rgba(52,211,153,0.12); background: linear-gradient(135deg, var(--surface) 0%, rgba(52,211,153,0.03) 100%); }
    .exercise-main { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; -webkit-user-select: none; user-select: none; }
    .check { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
    .check:active { transform: scale(0.85); }
    .check svg { width: 14px; height: 14px; stroke: transparent; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; transition: all 0.25s; }
    .exercise.completed .check { background: var(--green); border-color: var(--green); box-shadow: 0 0 16px var(--green-glow); }
    .exercise.completed .check svg { stroke: #fff; }
    .exercise-content { flex: 1; min-width: 0; }
    .exercise-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .exercise-name { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    a.exercise-name { color: var(--text); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    a.exercise-name::after { content: '▶'; font-size: 9px; color: var(--accent-lift); opacity: 0.6; }
    .exercise.completed .exercise-name { opacity: 0.4; text-decoration: line-through; text-decoration-color: rgba(52,211,153,0.3); }
    .exercise-duration { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
    .exercise-tags { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
    .tag { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; }
    .tag--warmup { background: var(--accent-warmup-dim); color: var(--accent-warmup); }
    .tag--lift { background: var(--accent-lift-dim); color: var(--accent-lift); }
    .tag--cardio { background: var(--accent-cardio-dim); color: var(--accent-cardio); }
    .tag--hiit { background: var(--accent-hiit-dim); color: var(--accent-hiit); }
    .tag--superset { background: rgba(251,191,36,0.08); color: #fbbf24; }
    .tag--norest { background: rgba(251,113,133,0.06); color: #fb7185; font-size: 8px; }
    .tag--pyramid { background: rgba(167,139,250,0.08); color: #a78bfa; font-size: 8px; }
    .expand-chevron { width: 18px; height: 18px; flex-shrink: 0; color: var(--text-muted); transition: all 0.3s; opacity: 0.5; }
    .exercise.expanded .expand-chevron { transform: rotate(180deg); opacity: 0.8; }

    .exercise.expanded .exercise-detail { grid-template-rows: 1fr; }

    .load-input { width: 72px; padding: 6px 10px; background: var(--surface-2); border: 1px solid var(--border-light); border-radius: 8px; color: var(--text); font-family: var(--font-display); font-size: 14px; font-weight: 700; text-align: center; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .load-input:focus { border-color: var(--accent-lift); box-shadow: 0 0 0 2px var(--accent-lift-dim); }

    .rest-input:focus { border-color: var(--accent-cardio); box-shadow: 0 0 0 2px var(--accent-cardio-dim); }

    .rest-label::before { content: '⏱'; font-size: 12px; }
    .detail-row { display: flex; align-items: baseline; gap: 8px; font-size: 13px; }
    .detail-label { color: var(--text-muted); font-weight: 500; white-space: nowrap; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-value { color: var(--text-dim); font-weight: 400; font-size: 13px; }

    .rest-message h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .rest-message p { color: var(--text-muted); font-size: 14px; }
    .session-complete { display: none; text-align: center; padding: 36px 24px; margin-top: 28px; background: linear-gradient(135deg, rgba(52,211,153,0.06) 0%, rgba(52,211,153,0.02) 100%); border: 1px solid rgba(52,211,153,0.15); border-radius: var(--radius); }

// ─── Dynamic week dates ───
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(dt.setDate(diff));
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function buildWeek() {
  const monday = getMonday(new Date());
  const DAYS = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
  const MONTHS = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
  return WEEK_SCHEDULE.map((s, i) => {
    const dt = new Date(monday);
    dt.setDate(monday.getDate() + i);
    const dateStr = dt.getFullYear() + '-' + pad(dt.getMonth()+1) + '-' + pad(dt.getDate());
    const entry = {
      day: s.dayName,
      date: dateStr,
      num: dt.getDate(),
      rest: s.rest,
      label: s.label,
    };
    if (s.blocks) entry.blocks = s.blocks;
    return entry;
  });
}

const TRAINING_SLOTS = [
  { label: 'Treino 1 — Anterior', blocks: TREINO_A },
  { label: 'Treino 2 — Posterior', blocks: TREINO_B },
  { label: 'Treino 1 — Anterior', blocks: TREINO_A },
  { label: 'Treino 2 — Posterior', blocks: TREINO_B },
];
const ALL_DAYS = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
const DAY_CONFIG_KEY = 'maxresults-alessandra-days-v1';
const DEFAULT_DAYS = ['Seg', 'Ter', 'Qui', 'Sex'];

function loadDayConfig() {
  try { return JSON.parse(localStorage.getItem(DAY_CONFIG_KEY)) || DEFAULT_DAYS; }
  catch { return DEFAULT_DAYS; }
}

function buildSchedule() {
  const chosen = loadDayConfig();
  let slotIdx = 0;
  return ALL_DAYS.map(day => {
    if (chosen.includes(day) && slotIdx < TRAINING_SLOTS.length) {
      const slot = TRAINING_SLOTS[slotIdx++];
      return { dayName: day, rest: false, label: slot.label, blocks: slot.blocks };
    }
    return { dayName: day, rest: true, label: 'Descanso' };
  });
}

let WEEK_SCHEDULE = buildSchedule();
let WEEK = buildWeek();

// Dynamic storage key based on current week
function getWeekKey() {
  const m = getMonday(new Date());
  return m.getFullYear() + '-' + pad(m.getMonth()+1) + '-' + pad(m.getDate());
}


const STORAGE_KEY = 'maxresults-alessandra-' + getWeekKey() + '-v1';

let completedExercises = loadProgress();

function loadProgress() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveProgress() { localStorage.setItem(STORAGE_KEY, JSON.stringify(completedExercises)); }
function exerciseKey(di, bi, ei) { return `${di}-${bi}-${ei}`; }

function findCurrentDay() {
  const today = new Date().toISOString().split('T')[0];
  // First: show today if it exists in the week (even rest days)
  const todayIdx = WEEK.findIndex(d => d.date === today);
  if (todayIdx !== -1) return todayIdx;
  // Fallback: find next training day
  for (let i = 0; i < WEEK.length; i++) { if (WEEK[i].date >= today && !WEEK[i].rest) return i; }
  return 0;
}

function playVideo(e, url) {
  // OneDrive links: let them open in new tab normally
  if (url.includes('1drv.ms') || url.includes('onedrive')) {
    // Don't prevent default - let the link open
    return;
  }
  e.preventDefault();
  const overlay = document.getElementById('videoOverlay');
  const player = document.getElementById('videoPlayer');
  const ytPlayer = document.getElementById('ytPlayer');
  if (url.startsWith('yt:')) {
    ytPlayer.src = `https://www.youtube.com/embed/${url.slice(3)}?autoplay=1`;
    ytPlayer.style.display = 'block'; player.style.display = 'none';
  } else {
    player.src = url; player.style.display = 'block'; ytPlayer.style.display = 'none'; player.play().catch(err => {
      console.error('Error playing video:', err);
      alert('Erro ao carregar o vídeo. Tente abrir em nova aba.');
    });
  }
  overlay.classList.add('active');
}

function closeVideo() {
  const overlay = document.getElementById('videoOverlay');
  const player = document.getElementById('videoPlayer');
  const ytPlayer = document.getElementById('ytPlayer');
  player.pause(); player.src = ''; ytPlayer.src = '';
  player.style.display = 'none'; ytPlayer.style.display = 'none';
  overlay.classList.remove('active');
}

function updateProgress() {
  const day = WEEK[currentDayIndex];
  if (day.rest) { document.getElementById('progressFill').style.width='0%'; document.getElementById('progressLabel').textContent='—'; return; }
  const total = day.blocks.reduce((s,b) => s+b.exercises.length, 0);
  const done = day.blocks.reduce((s,b,bi) => s+b.exercises.filter((_,ei) => completedExercises[exerciseKey(currentDayIndex,bi,ei)]).length, 0);
  const pct = total>0 ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = pct+'%';
  const complete = document.getElementById('sessionComplete');
  pct===100 ? complete.classList.add('visible') : complete.classList.remove('visible');
}

function isDayComplete(di) {
  const d = WEEK[di]; if (d.rest||!d.blocks) return false;
  return d.blocks.every((b,bi) => b.exercises.every((_,ei) => completedExercises[exerciseKey(di,bi,ei)]));
}

function renderWeekOverview() {
  document.getElementById('weekOverview').innerHTML = WEEK.map((d,i) => {
    const cur = i===currentDayIndex;
    const done = isDayComplete(i) || isWorkoutFinished(i);
    return `<div class="week-day-summary"><div class="week-day-label">${d.day}</div><div class="week-day-desc">${d.label}</div><div class="week-day-status ${d.rest?'rest':cur?'today':''}">${d.rest?'😴':done?'✓':cur?'Atual':d.day}</div></div>`;
  }).join('');
}

function selectDay(i) { if (WEEK[i].rest) return; currentDayIndex=i; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function toggleExercise(key) {
  completedExercises[key] ? delete completedExercises[key] : completedExercises[key]=true;
  saveProgress();
  const el = document.getElementById('ex-'+key);
  if (el) el.classList.toggle('completed', !!completedExercises[key]);
  updateBlockProgress(); updateProgress(); updateFinishButton(); renderDaySwitcher();
}

function updateBlockProgress() {
  const day = WEEK[currentDayIndex]; if (day.rest) return;
  document.querySelectorAll('.block').forEach((bel,bi) => {
    const block = day.blocks[bi]; if (!block) return;
    const total = block.exercises.length;
    const done = block.exercises.filter((_,ei) => completedExercises[exerciseKey(currentDayIndex,bi,ei)]).length;
    const badge = bel.querySelector('.block-progress');
    if (badge) { badge.textContent=`${done}/${total}`; badge.classList.toggle('done', done===total); }
  });
}

function toggleDetail(key) { document.getElementById('ex-'+key).classList.toggle('expanded'); }

// ─── Day Configuration ───
function openDayModal() {
  const chosen = loadDayConfig();
  document.getElementById('dayOptions').innerHTML = ALL_DAYS.map(day =>
    `<div class="day-option" onclick="this.querySelector('input').click()">
      <input type="checkbox" id="day-${day}" value="${day}" ${chosen.includes(day)?'checked':''} onclick="event.stopPropagation(); limitDaySelection()">
      <label for="day-${day}">${day}</label>
    </div>`
  ).join('');
  document.getElementById('dayModal').classList.add('active');
}

function closeDayModal() { document.getElementById('dayModal').classList.remove('active'); }

function limitDaySelection() {
  const checked = document.querySelectorAll('#dayOptions input:checked');
  const unchecked = document.querySelectorAll('#dayOptions input:not(:checked)');
  unchecked.forEach(cb => cb.disabled = checked.length >= 3);
}

function saveDayConfig() {
  const checked = [...document.querySelectorAll('#dayOptions input:checked')].map(cb => cb.value);
  if (checked.length < 1) { alert('Selecione pelo menos 1 dia!'); return; }
  if (checked.length > 3) { alert('Máximo 3 dias!'); return; }
  localStorage.setItem(DAY_CONFIG_KEY, JSON.stringify(checked));
  WEEK_SCHEDULE = buildSchedule();
  WEEK = buildWeek();
  currentDayIndex = findCurrentDay();
  render();
  closeDayModal();
}

function finishWorkout() {
  const day = WEEK[currentDayIndex];
  if (day.rest) return;
  const finished = loadFinished();
  const dateKey = day.date;
  
  // Collect skipped exercises
  const skipped = [];
  day.blocks.forEach((block, bi) => {
    block.exercises.forEach((ex, ei) => {
      const key = exerciseKey(currentDayIndex, bi, ei);
      if (!completedExercises[key]) skipped.push(ex.name);
    });
  });
  
  finished[dateKey] = {
    completed: true,
    partial: skipped.length > 0,
    skipped: skipped,
    timestamp: new Date().toISOString()
  };
  localStorage.setItem(FINISH_KEY, JSON.stringify(finished));
  
  const btn = document.getElementById('finishBtn');
  btn.classList.add('finished');
  btn.textContent = '✅ Treino Finalizado!';
  btn.disabled = true;
  
  const info = document.getElementById('skippedInfo');
  if (skipped.length > 0) {
    info.innerHTML = `<div class="skipped-list">⚠️ Exercícios pulados: <span>${skipped.join(', ')}</span></div>`;
  } else {
    info.innerHTML = `<div class="skipped-list" style="color:var(--green)">✅ Todos os exercícios concluídos!</div>`;
  }
  
  // Record session for frequency tracking
  recordSession();
  renderDaySwitcher();
}

function isWorkoutFinished(di) {
  const d = WEEK[di];
  if (!d || d.rest) return false;
  const finished = loadFinished();
  return finished[d.date]?.completed || false;
}

function updateFinishButton() {
  const day = WEEK[currentDayIndex];
  const btn = document.getElementById('finishBtn');
  const info = document.getElementById('skippedInfo');
  if (day.rest) { btn.classList.remove('show'); info.innerHTML = ''; return; }
  
  const finished = loadFinished();
  const alreadyFinished = finished[day.date]?.completed;
  const allDone = isDayComplete(currentDayIndex);
  
  if (allDone) {
    // All exercises done — session-complete shows, hide finish button
    btn.classList.remove('show');
    info.innerHTML = '';
  } else if (alreadyFinished) {
    btn.classList.add('show', 'finished');
    btn.textContent = '✅ Treino Finalizado!';
    btn.disabled = true;
    const skipped = finished[day.date]?.skipped || [];
    info.innerHTML = skipped.length > 0
      ? `<div class="skipped-list">⚠️ Exercícios pulados: <span>${skipped.join(', ')}</span></div>`
      : '';
  } else {
    // Some exercises pending — show finish button
    const total = day.blocks.reduce((s,b) => s+b.exercises.length, 0);
    const done = day.blocks.reduce((s,b,bi) => s+b.exercises.filter((_,ei) => completedExercises[exerciseKey(currentDayIndex,bi,ei)]).length, 0);
    if (done > 0) {
      btn.classList.add('show');
      btn.classList.remove('finished');
      btn.textContent = `⏭️ Finalizar Treino (${done}/${total} feitos)`;
      btn.disabled = false;
      info.innerHTML = '';
    } else {
      btn.classList.remove('show');
      info.innerHTML = '';
    }
  }
}

function renderEvolution(assessments) {
  if (assessments.length < 2) return '';
  const old = assessments[0];
  const cur = assessments[assessments.length - 1];
  
  function delta(oldVal, newVal, unit, lowerIsBetter) {
    const diff = newVal - oldVal;
    if (Math.abs(diff) < 0.01) return { html: '<span class="evo-delta neutral">—</span>', diff: 0 };
    const sign = diff > 0 ? '+' : '';
    const cls = lowerIsBetter ? (diff < 0 ? 'good' : 'bad') : (diff > 0 ? 'good' : 'bad');
    return { html: `<span class="evo-delta ${cls}">${sign}${diff.toFixed(1)}${unit}</span>`, diff };
  }
  
  const weightD = delta(old.basics.weight, cur.basics.weight, 'kg', true);
  const fatPctD = delta(old.results.fatPercent, cur.results.fatPercent, '%', true);
  const fatMassD = delta(old.results.fatMass, cur.results.fatMass, 'kg', true);
  const leanD = delta(old.results.leanMass, cur.results.leanMass, 'kg', false);
  const imcD = delta(old.results.imc, cur.results.imc, '', true);
  const skinD = delta(old.results.sumSkinfolds, cur.results.sumSkinfolds, 'mm', true);
  
  const periRows = [
    { label: 'Cintura', old: old.perimetry.cintura, cur: cur.perimetry.cintura },
    { label: 'Abdômen', old: old.perimetry.abdomen, cur: cur.perimetry.abdomen },
    { label: 'Quadril', old: old.perimetry.quadril, cur: cur.perimetry.quadril },
    { label: 'Coxa Esq.', old: old.perimetry.coxaE, cur: cur.perimetry.coxaE },
    { label: 'Coxa Dir.', old: old.perimetry.coxaD, cur: cur.perimetry.coxaD },
    { label: 'Braço Esq.', old: old.perimetry.bracoE, cur: cur.perimetry.bracoE },
    { label: 'Braço Dir.', old: old.perimetry.bracoD, cur: cur.perimetry.bracoD },
  ];
  
  return `
    <div class="evo-section">
      <div class="evo-title">📈 Evolução entre Avaliações</div>
      <div class="evo-period">${old.date} (${old.label}) → ${cur.date} (${cur.label})</div>
      <div class="evo-summary">
        <div class="evo-summary-item"><div class="evo-summary-value green">${(old.basics.weight - cur.basics.weight).toFixed(1)}kg</div><div class="evo-summary-label">Peso perdido</div></div>
        <div class="evo-summary-item"><div class="evo-summary-value green">${(old.results.fatMass - cur.results.fatMass).toFixed(1)}kg</div><div class="evo-summary-label">Gordura perdida</div></div>
        <div class="evo-summary-item"><div class="evo-summary-value ${old.perimetry.cintura - cur.perimetry.cintura > 0 ? 'green' : 'red'}">${(old.perimetry.cintura - cur.perimetry.cintura).toFixed(1)}cm</div><div class="evo-summary-label">Cintura reduzida</div></div>
        <div class="evo-summary-item"><div class="evo-summary-value ${old.perimetry.abdomen - cur.perimetry.abdomen > 0 ? 'green' : 'red'}">${(old.perimetry.abdomen - cur.perimetry.abdomen).toFixed(1)}cm</div><div class="evo-summary-label">Abdômen reduzido</div></div>
      </div>
      <div class="evo-card">
        <div class="evo-row"><span class="evo-label">Peso</span><div class="evo-values"><span class="evo-old">${old.basics.weight}kg</span><span class="evo-new">${cur.basics.weight}kg</span>${weightD.html}</div></div>
        <div class="evo-row"><span class="evo-label">% Gordura</span><div class="evo-values"><span class="evo-old">${old.results.fatPercent}%</span><span class="evo-new">${cur.results.fatPercent}%</span>${fatPctD.html}</div></div>
        <div class="evo-row"><span class="evo-label">Massa Gorda</span><div class="evo-values"><span class="evo-old">${old.results.fatMass}kg</span><span class="evo-new">${cur.results.fatMass}kg</span>${fatMassD.html}</div></div>
        <div class="evo-row"><span class="evo-label">Massa Magra</span><div class="evo-values"><span class="evo-old">${old.results.leanMass}kg</span><span class="evo-new">${cur.results.leanMass}kg</span>${leanD.html}</div></div>
        <div class="evo-row"><span class="evo-label">IMC</span><div class="evo-values"><span class="evo-old">${old.results.imc}</span><span class="evo-new">${cur.results.imc}</span>${imcD.html}</div></div>

// ─── Session Timer ───
const TIMER_KEY = 'maxresults-alessandra-timer-v1';
const HISTORY_KEY = 'maxresults-alessandra-history-v1';
let timerInterval = null;
let sessionStartTime = null;

function loadTimerState() { try { return JSON.parse(localStorage.getItem(TIMER_KEY) || 'null'); } catch { return null; } }
function saveTimerState(state) { if (state) localStorage.setItem(TIMER_KEY, JSON.stringify(state)); else localStorage.removeItem(TIMER_KEY); }
function loadHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; } }
function saveHistory(history) { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

function formatTimer(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec;
}

function formatDuration(ms) {
  const totalMin = Math.floor(ms / 60000);
  if (totalMin < 60) return totalMin + 'min';
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h + 'h' + (m > 0 ? m + 'min' : '');
}

function startSession() {
  sessionStartTime = Date.now();
  saveTimerState({ start: sessionStartTime, dayIndex: currentDayIndex });
  document.getElementById('startBtn').classList.add('hidden');
  document.getElementById('timerBar').classList.add('active');
  document.getElementById('stopBtn').classList.remove('hidden');
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
}

function updateTimer() {
  if (!sessionStartTime) return;
  const elapsed = Date.now() - sessionStartTime;
  document.getElementById('timerDisplay').textContent = formatTimer(elapsed);
}

function stopSession() {
  if (!sessionStartTime) return;
  const elapsed = Date.now() - sessionStartTime;
  clearInterval(timerInterval);
  const day = WEEK[currentDayIndex];
  let total = 0, done = 0;
  if (day && day.blocks) {
    day.blocks.forEach((b, bi) => { b.exercises.forEach((_, ei) => { total++; if (completedExercises[exerciseKey(currentDayIndex, bi, ei)]) done++; }); });
  }
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const history = loadHistory();
  history.push({ date: new Date().toISOString(), dayIndex: currentDayIndex, dayLabel: day ? day.label : '', dayName: day ? day.day : '', duration: elapsed, completionPct: pct, weekKey: getWeekKey() });
  const cutoff = Date.now() - 90 * 24 * 60 * 60 * 1000;
  saveHistory(history.filter(h => new Date(h.date).getTime() > cutoff));
  sessionStartTime = null;
  saveTimerState(null);
  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('timerBar').classList.remove('active');
  document.getElementById('stopBtn').classList.add('hidden');
  document.getElementById('timerDisplay').textContent = '00:00';
  alert('Sessão finalizada! \nTempo: ' + formatDuration(elapsed) + '\nExercícios: ' + pct + '% concluídos');
}

function restoreTimer() {
  const state = loadTimerState();
  if (state && state.start) {
    const elapsed = Date.now() - state.start;
    if (elapsed < 3 * 60 * 60 * 1000) {
      sessionStartTime = state.start;
      document.getElementById('startBtn').classList.add('hidden');
      document.getElementById('timerBar').classList.add('active');
      document.getElementById('stopBtn').classList.remove('hidden');
      timerInterval = setInterval(updateTimer, 1000);
      updateTimer();
    } else { saveTimerState(null); }
  }
}
restoreTimer();

const AVATAR_KEY = 'maxresults-alessandra-avatar-v1';
function loadAvatar() {
  const data = localStorage.getItem(AVATAR_KEY);

  if (data && circle) {
    circle.innerHTML = '<img src="' + data + '" alt="Foto">';

function saveAvatar(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const size = 150;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2, sy = (img.height - min) / 2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      localStorage.setItem(AVATAR_KEY, dataUrl);
      loadAvatar();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('avatarInput').addEventListener('change', function(e) {
  if (e.target.files && e.target.files[0]) saveAvatar(e.target.files[0]);
});
