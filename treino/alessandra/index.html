<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Treino arquivado — Alessandra</title>
  <style>
    :root { --bg:#0b1020; --card:#131a2a; --text:#eef2ff; --muted:#aab4d6; --accent:#f59e0b; --border:rgba(255,255,255,.1); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:radial-gradient(circle at top, #18223a, var(--bg)); color:var(--text); font:16px/1.5 Inter, system-ui, sans-serif; }
    .card { width:min(680px, 100%); background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.35); }
    .badge { display:inline-block; padding:6px 10px; border-radius:999px; background:rgba(245,158,11,.15); color:#fbbf24; font-weight:700; font-size:12px; letter-spacing:.04em; text-transform:uppercase; margin-bottom:14px; }
    h1 { margin:0 0 8px; font-size:32px; }
    p { margin:0 0 14px; color:var(--muted); }
    strong { color:var(--text); }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Treino arquivado</div>
    <h1>Alessandra</h1>
    <p>Este link não está mais ativo como treino em andamento.</p>
    <p><strong>Status:</strong> aluna arquivada / não está mais treinando com o Luisão.</p>
    <p>Se precisar reativar ou criar um novo ciclo, falar com o Luisão.</p>
  </main>
</body>
</html>
