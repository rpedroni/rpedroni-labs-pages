<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rafael André — Treino | MaxResults</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#08080a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080a;
      --surface: #111114;
      --surface-2: #19191d;
      --surface-3: #222226;
      --border: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.1);
      --text: #ededef;
      --text-dim: #b0b0b6;
      --text-muted: #6b6b73;
      --accent-lift: #f59e0b;
      --accent-lift-dim: rgba(245,158,11,0.1);
      --accent-lift-glow: rgba(245,158,11,0.3);
      --accent-lift-strong: rgba(245,158,11,0.18);
      --accent-warmup: #fb7185;
      --accent-warmup-dim: rgba(251,113,133,0.1);
      --accent-warmup-glow: rgba(251,113,133,0.3);
      --accent-mobility: #a78bfa;
      --accent-mobility-dim: rgba(167,139,250,0.1);
      --accent-mobility-glow: rgba(167,139,250,0.3);
      --accent-cardio: #22d3ee;
      --accent-cardio-dim: rgba(34,211,238,0.08);
      --accent-cardio-glow: rgba(34,211,238,0.25);
      --accent-cardio-strong: rgba(34,211,238,0.15);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.1);
      --green-glow: rgba(52,211,153,0.3);
      --radius: 16px;
      --radius-sm: 10px;
      --font-display: 'Outfit', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(245,158,11,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 120px;
      position: relative;
      z-index: 1;
    }

    .avatar-wrap { display: flex; align-items: center; gap: 12px; }
    .avatar-circle { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--accent-lift); overflow: hidden; cursor: pointer; flex-shrink: 0; position: relative; background: var(--surface-2); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .avatar-circle:active { transform: scale(0.95); }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-circle .avatar-placeholder { color: var(--text-muted); font-size: 20px; line-height: 1; }
    .avatar-circle .avatar-hint { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; border-radius: 50%; background: var(--accent-lift); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #000; font-weight: 800; border: 2px solid var(--bg); }
    .avatar-circle.has-photo .avatar-hint { display: none; }
    #avatarInput { display: none; }
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,8,10,0.82);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .brand {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent-lift), #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-date {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.8px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title .athlete { color: var(--text); }
    .header-title .separator { color: var(--text-muted); margin: 0 4px; font-weight: 400; }
    .header-title .day { color: var(--text-dim); font-weight: 500; font-size: 20px; }

    .progress-bar-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-track {
      flex: 1;
      height: 5px;
      background: var(--surface-2);
      border-radius: 100px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent-lift), var(--green));
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      width: 0%;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green-glow);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .progress-bar-container:has(.progress-fill:not([style*="width: 0%"])) .progress-fill::after {
      opacity: 1;
    }

    .progress-label {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 36px;
      text-align: right;
      transition: color 0.3s;
    }

    .week-goal {
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .week-goal::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-lift), var(--accent-cardio));
    }

    .week-goal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .week-goal-label {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .week-goal-badge {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--accent-lift-dim);
      color: var(--accent-lift);
      border: 1px solid rgba(245,158,11,0.08);
    }

    .week-goal-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .week-goal-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .week-goal-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .week-goal-icon.strength { background: var(--accent-lift-dim); }
    .week-goal-icon.cardio { background: var(--accent-cardio-dim); }
    .week-goal-icon.assessment { background: var(--accent-mobility-dim); }
    .week-goal-icon.fat { background: var(--accent-warmup-dim); }

    .week-goal-text {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      line-height: 1.3;
    }

    .week-goal-text strong {
      color: var(--text);
      font-weight: 700;
    }

    .day-switcher {
      display: flex;
      gap: 6px;
      padding: 20px 0 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .day-switcher::-webkit-scrollbar { display: none; }

    .day-btn {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-appearance: none;
      appearance: none;
      position: relative;
      overflow: hidden;
    }

    .day-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--accent-lift-dim) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .day-btn .day-num {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--text-dim);
      position: relative;
    }

    .day-btn.active {
      background: var(--surface-2);
      border-color: rgba(245,158,11,0.3);
      color: var(--accent-lift);
      box-shadow: 0 0 24px rgba(245,158,11,0.08), inset 0 1px 0 rgba(245,158,11,0.1);
    }
    .day-btn.active::before { opacity: 1; }
    .day-btn.active .day-num { color: var(--accent-lift); }

    .day-btn.rest { opacity: 0.3; cursor: default; }

    .day-btn.completed-day::after {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
      margin-top: 2px;
      position: relative;
    }

    .block { margin-top: 28px; }

    .initial-load .block { animation: blockReveal 0.5s cubic-bezier(0.4, 0, 0.2, 1) both; }
    .initial-load .block:nth-child(2) { animation-delay: 0.08s; }
    .initial-load .block:nth-child(3) { animation-delay: 0.16s; }
    .initial-load .block:nth-child(4) { animation-delay: 0.24s; }
    .initial-load .block:nth-child(5) { animation-delay: 0.32s; }
    .initial-load .block:nth-child(6) { animation-delay: 0.40s; }
    .initial-load .block:nth-child(7) { animation-delay: 0.48s; }

    @keyframes blockReveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .block-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .block-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .block--warmup .block-dot { background: var(--accent-warmup); box-shadow: 0 0 10px var(--accent-warmup-glow), 0 0 30px rgba(251,113,133,0.1); }
    .block--stretching .block-dot { background: var(--accent-mobility); box-shadow: 0 0 10px var(--accent-mobility-glow), 0 0 30px rgba(167,139,250,0.1); }
    .block--lift .block-dot { background: var(--accent-lift); box-shadow: 0 0 10px var(--accent-lift-glow), 0 0 30px rgba(245,158,11,0.1); }
    .block--cardio .block-dot { background: var(--accent-cardio); box-shadow: 0 0 10px var(--accent-cardio-glow), 0 0 30px rgba(34,211,238,0.1); }

    .block-name {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .block--warmup .block-name { color: var(--accent-warmup); }
    .block--stretching .block-name { color: var(--accent-mobility); }
    .block--lift .block-name { color: var(--accent-lift); }
    .block--cardio .block-name { color: var(--accent-cardio); }

    .block-subtitle {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 2px;
    }

    .block-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
      letter-spacing: 0.2px;
      white-space: pre-wrap;
    }

    .block-progress {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--surface-2);
      padding: 5px 12px;
      border-radius: 100px;
      letter-spacing: 0.5px;
      transition: all 0.3s;
    }

    .block-progress.done {
      background: var(--green-dim);
      color: var(--green);
      box-shadow: 0 0 12px rgba(52,211,153,0.15);
    }

    .exercise {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .initial-load .exercise { animation: exerciseReveal 0.4s cubic-bezier(0.4, 0, 0.2, 1) both; }

    @keyframes exerciseReveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .exercise:active { transform: scale(0.985); }

    .exercise.completed {
      border-color: rgba(52,211,153,0.12);
      background: linear-gradient(135deg, var(--surface) 0%, rgba(52,211,153,0.03) 100%);
    }

    .exercise-main {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .check {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      position: relative;
    }

    .check:active { transform: scale(0.85); }

    .check svg {
      width: 14px;
      height: 14px;
      stroke: transparent;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .exercise.completed .check {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 16px var(--green-glow);
    }

    .exercise.completed .check svg {
      stroke: #fff;
      stroke-dasharray: 20;
      animation: checkDraw 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes checkDraw {
      from { stroke-dashoffset: 20; }
      to { stroke-dashoffset: 0; }
    }

    .exercise.completed .check::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--green);
      animation: checkPulse 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes checkPulse {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .exercise-content { flex: 1; min-width: 0; }

    .exercise-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .exercise-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      transition: all 0.25s;
    }

    a.exercise-name {
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    a.exercise-name::before {
      content: '▶';
      font-size: 9px;
      color: var(--accent-lift);
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    a.exercise-name:active::before { opacity: 1; }

    .exercise.completed .exercise-name {
      opacity: 0.4;
      text-decoration: line-through;
      text-decoration-color: rgba(52,211,153,0.3);
      text-decoration-thickness: 1.5px;
    }

    .exercise-duration {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .exercise-tags {
      display: flex;
      gap: 6px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .tag--warmup { background: var(--accent-warmup-dim); color: var(--accent-warmup); border: 1px solid rgba(251,113,133,0.08); }
    .tag--stretching { background: var(--accent-mobility-dim); color: var(--accent-mobility); border: 1px solid rgba(167,139,250,0.08); }
    .tag--lift { background: var(--accent-lift-dim); color: var(--accent-lift); border: 1px solid rgba(245,158,11,0.08); }
    .tag--cardio { background: var(--accent-cardio-dim); color: var(--accent-cardio); border: 1px solid rgba(34,211,238,0.06); }
    .tag--superset { background: rgba(251,191,36,0.08); color: #fbbf24; border: 1px solid rgba(251,191,36,0.08); }
    .tag--triset { background: rgba(168,85,247,0.08); color: #a855f7; border: 1px solid rgba(168,85,247,0.08); }
    .tag--norest { background: rgba(251,113,133,0.06); color: #fb7185; border: 1px solid rgba(251,113,133,0.06); font-size: 8px; }

    .expand-chevron {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: var(--text-muted);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0.5;
    }

    .exercise.expanded .expand-chevron { transform: rotate(180deg); opacity: 0.8; }

    .exercise-detail {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s ease;
      overflow: hidden;
    }

    .exercise.expanded .exercise-detail { grid-template-rows: 1fr; }

    .exercise-detail > .detail-inner { overflow: hidden; }

    .detail-inner {
      padding: 0 16px 16px;
      padding-left: 58px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .load-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .load-label {
      color: var(--text-muted);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .load-input {
      width: 72px;
      padding: 6px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .load-input:focus {
      border-color: var(--accent-lift);
      box-shadow: 0 0 0 2px var(--accent-lift-dim);
    }

    .load-input::placeholder {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 12px;
    }

    .load-unit {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
    }

    .detail-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 13px;
      line-height: 1.4;
    }

    .detail-label {
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      color: var(--text-dim);
      font-weight: 400;
      font-size: 13px;
    }

    .rest-message {
      text-align: center;
      padding: 80px 20px;
    }

    .rest-message h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .rest-message p { color: var(--text-muted); font-size: 14px; }

// ─── Dynamic week dates ───
function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(dt.setDate(diff));
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function buildWeek() {
  const monday = getMonday(new Date());
  const DAYS = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
  const MONTHS = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
  return WEEK_SCHEDULE.map((s, i) => {
    const dt = new Date(monday);
    dt.setDate(monday.getDate() + i);
    const dateStr = dt.getFullYear() + '-' + pad(dt.getMonth()+1) + '-' + pad(dt.getDate());
    const entry = {
      day: s.dayName,
      date: dateStr,
      num: dt.getDate(),
      rest: s.rest,
      label: s.label,
    };
    if (s.blocks) entry.blocks = s.blocks;
    return entry;
  });
}

const TRAINING_SLOTS = [
  { label: 'Treino A — Peito, Tríceps e Abdômen', blocks: TREINO_A },
  { label: 'Treino B — Pernas e Ombros', blocks: TREINO_B },
  { label: 'Treino C — Costas e Bíceps', blocks: TREINO_C },
];
const ALL_DAYS = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
const DAY_CONFIG_KEY = 'maxresults-rafael-days-v1';
const DEFAULT_DAYS = ['Seg', 'Qua', 'Sex'];

function loadDayConfig() {
  try { return JSON.parse(localStorage.getItem(DAY_CONFIG_KEY)) || DEFAULT_DAYS; }
  catch { return DEFAULT_DAYS; }
}

function buildSchedule() {
  const chosen = loadDayConfig();
  let slotIdx = 0;
  return ALL_DAYS.map(day => {
    if (chosen.includes(day) && slotIdx < TRAINING_SLOTS.length) {
      const slot = TRAINING_SLOTS[slotIdx++];
      return { dayName: day, rest: false, label: slot.label, blocks: slot.blocks };
    }
    return { dayName: day, rest: true, label: 'Descanso' };
  });
}

function getWeekKey() {
  const m = getMonday(new Date());
  return m.getFullYear() + '-' + pad(m.getMonth()+1) + '-' + pad(m.getDate());
}

function exerciseKey(dayIndex, blockIndex, exIndex) {
  return `${dayIndex}-${blockIndex}-${exIndex}`;
}

function findCurrentDay() {
  const today = new Date().toISOString().split('T')[0];
  const todayIdx = WEEK.findIndex(d => d.date === today);
  if (todayIdx !== -1) return todayIdx;
  for (let i = 0; i < WEEK.length; i++) {
    if (WEEK[i].date >= today && !WEEK[i].rest) return i;
  }
  return 0;
}

function updateProgress() {

  if (day.rest) {
    document.getElementById('progressFill').style.width = '0%';

    return;
  }
  const totalExercises = day.blocks.reduce((sum, b) => sum + b.exercises.length, 0);
  const doneExercises = day.blocks.reduce((sum, b, bi) =>
    sum + b.exercises.filter((_, ei) => completedExercises[exerciseKey(currentDayIndex, bi, ei)]).length, 0);
  const pct = totalExercises > 0 ? Math.round((doneExercises / totalExercises) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
  const complete = document.getElementById('sessionComplete');
  if (pct === 100) { complete.classList.add('visible'); } else { complete.classList.remove('visible'); }
}

function isDayComplete(dayIndex) {
  const day = WEEK[dayIndex];
  if (day.rest || !day.blocks) return false;
  return day.blocks.every((b, bi) =>
    b.exercises.every((_, ei) => completedExercises[exerciseKey(dayIndex, bi, ei)])
  );
}

function formatTimer(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return (min < 10 ? '0' : '') + min + ':' + (sec < 10 ? '0' : '') + sec;
}

function formatDuration(ms) {
  const totalMin = Math.floor(ms / 60000);
  if (totalMin < 60) return totalMin + 'min';
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h + 'h' + (m > 0 ? m + 'min' : '');
}

  localStorage.setItem(FINISH_KEY, JSON.stringify(finished));
  document.getElementById('finishBtn').classList.add('finished');
  document.getElementById('finishBtn').textContent = `✅ Finalizado (${done}/${total} — ${pct}%)`;
  if (skipped.length > 0) document.getElementById('finishInfo').innerHTML = `⏭️ Pulados: ${skipped.join(', ')}`;
}
function updateFinishButton() {
  const day = WEEK[currentDayIndex]; const btn = document.getElementById('finishBtn'); const info = document.getElementById('finishInfo');
  if (!btn || !info) return;
  if (!day || day.rest) { btn.classList.remove('show'); info.innerHTML = ''; return; }
  let total = 0, done = 0;
  day.blocks.forEach((b, bi) => { b.exercises.forEach((_, ei) => { total++; if (completedExercises[exerciseKey(currentDayIndex, bi, ei)]) done++; }); });
  const finished = loadFinished(); const weekKey = getWeekKey(); const dayFinished = finished[weekKey]?.[currentDayIndex];
  if (done === total && total > 0) { btn.classList.remove('show'); info.innerHTML = ''; return; }
  if (dayFinished) { btn.classList.add('show', 'finished'); btn.textContent = `✅ Finalizado (${dayFinished.done}/${dayFinished.total} — ${dayFinished.pct}%)`; if (dayFinished.skipped?.length > 0) info.innerHTML = `⏭️ Pulados: ${dayFinished.skipped.join(', ')}`; return; }
  if (done > 0) { btn.classList.add('show'); btn.classList.remove('finished'); btn.textContent = `⏭️ Finalizar Treino (${done}/${total} feitos)`; info.innerHTML = ''; }
  else { btn.classList.remove('show'); info.innerHTML = ''; }
}

const AVATAR_KEY = 'maxresults-rafael-avatar-v1';
function loadAvatar() {
  const data = localStorage.getItem(AVATAR_KEY);
  const circle = document.getElementById('avatarCircle');
  if (data && circle) {
    circle.innerHTML = '<img src="' + data + '" alt="Foto">';
    circle.classList.add('has-photo');
  }
}
function saveAvatar(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const size = 150;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2, sy = (img.height - min) / 2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      localStorage.setItem(AVATAR_KEY, dataUrl);
      loadAvatar();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('avatarInput').addEventListener('change', function(e) {
  if (e.target.files && e.target.files[0]) saveAvatar(e.target.files[0]);
});
