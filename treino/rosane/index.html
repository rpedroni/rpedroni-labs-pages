  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080a; --surface: #111114; --surface-2: #19191d; --surface-3: #222226;
      --border: rgba(255,255,255,0.06); --border-light: rgba(255,255,255,0.1);
      --text: #ededef; --text-dim: #b0b0b6; --text-muted: #6b6b73;
      --accent-lift: #f59e0b; --accent-lift-dim: rgba(245,158,11,0.1); --accent-lift-glow: rgba(245,158,11,0.3); --accent-lift-strong: rgba(245,158,11,0.18);
      --accent-warmup: #fb7185; --accent-warmup-dim: rgba(251,113,133,0.1); --accent-warmup-glow: rgba(251,113,133,0.3);
      --accent-mobility: #a78bfa; --accent-mobility-dim: rgba(167,139,250,0.1);
      --accent-cardio: #22d3ee; --accent-cardio-dim: rgba(34,211,238,0.08); --accent-cardio-glow: rgba(34,211,238,0.25);
      --accent-hiit: #c084fc; --accent-hiit-dim: rgba(192,132,252,0.1); --accent-hiit-glow: rgba(192,132,252,0.3);
      --green: #34d399; --green-dim: rgba(52,211,153,0.1); --green-glow: rgba(52,211,153,0.3);
      --radius: 16px; --radius-sm: 10px;
      --font-display: 'Outfit', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100dvh; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    body::after { content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 128px 128px; }
    body::before { content: ''; position: fixed; top: -120px; left: 50%; transform: translateX(-50%); width: 600px; height: 300px; background: radial-gradient(ellipse, rgba(245,158,11,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .container { max-width: 480px; margin: 0 auto; padding: 0 20px 120px; position: relative; z-index: 1; }
    .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(8,8,10,0.82); backdrop-filter: blur(24px) saturate(1.6); -webkit-backdrop-filter: blur(24px) saturate(1.6); padding: 20px 0 16px; border-bottom: 1px solid var(--border); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .brand { font-family: var(--font-display); font-size: 16px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; background: linear-gradient(135deg, var(--accent-lift), #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header-date { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .header-title { font-family: var(--font-display); font-size: 24px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .header-title .athlete { color: var(--text); }
    .header-title .separator { color: var(--text-muted); margin: 0 4px; font-weight: 400; }
    .header-title .day { color: var(--text-dim); font-weight: 500; font-size: 20px; }
    .progress-bar-container { display: flex; align-items: center; gap: 12px; }
    .progress-track { flex: 1; height: 5px; background: var(--surface-2); border-radius: 100px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent-lift), var(--green)); transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); width: 0%; position: relative; }
    .progress-fill::after { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green-glow); opacity: 0; transition: opacity 0.3s; }
    .progress-bar-container:has(.progress-fill:not([style*="width: 0%"])) .progress-fill::after { opacity: 1; }
    .progress-label { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text-muted); white-space: nowrap; min-width: 36px; text-align: right; }
    .week-goal { margin-top: 16px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); position: relative; overflow: hidden; }
    .week-goal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent-lift), var(--accent-cardio)); }
    .week-goal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .week-goal-label { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
    .week-goal-badge { font-family: var(--font-display); font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; background: var(--accent-lift-dim); color: var(--accent-lift); border: 1px solid rgba(245,158,11,0.08); }
    .week-goal-items { display: flex; flex-direction: column; gap: 8px; }
    .week-goal-item { display: flex; align-items: center; gap: 10px; }
    .week-goal-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .week-goal-icon.strength { background: var(--accent-lift-dim); }
    .week-goal-icon.cardio { background: var(--accent-cardio-dim); }
    .week-goal-icon.assessment { background: var(--accent-mobility-dim); }
    .week-goal-icon.fat { background: var(--accent-warmup-dim); }
    .week-goal-icon.hiit { background: var(--accent-hiit-dim); }
    .week-goal-text { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-dim); line-height: 1.3; }
    .week-goal-text strong { color: var(--text); font-weight: 700; }
    .elbow-alert { margin-top: 12px; padding: 12px 14px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); font-size: 12px; line-height: 1.5; color: var(--text-dim); }
    .elbow-alert strong { color: #ef4444; }
    .elbow-alert em { color: var(--text); font-style: normal; font-weight: 600; }
    .day-switcher { display: flex; gap: 6px; padding: 20px 0 12px; overflow-x: auto; scrollbar-width: none; }
    .day-switcher::-webkit-scrollbar { display: none; }
    .day-btn { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; -webkit-appearance: none; position: relative; overflow: hidden; }
    .day-btn::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 0%, var(--accent-lift-dim) 0%, transparent 70%); opacity: 0; transition: opacity 0.2s; }
    .day-btn .day-num { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--text-dim); position: relative; }
    .day-btn.active { background: var(--surface-2); border-color: rgba(245,158,11,0.3); color: var(--accent-lift); box-shadow: 0 0 24px rgba(245,158,11,0.08), inset 0 1px 0 rgba(245,158,11,0.1); }
    .day-btn.active::before { opacity: 1; }
    .day-btn.active .day-num { color: var(--accent-lift); }
    .day-btn.rest { opacity: 0.3; cursor: default; }
    .day-btn.completed-day::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green-glow); margin-top: 2px; }
    .block { margin-top: 28px; }
    .initial-load .block { animation: blockReveal 0.5s cubic-bezier(0.4, 0, 0.2, 1) both; }
    .initial-load .block:nth-child(2) { animation-delay: 0.08s; }
    .initial-load .block:nth-child(3) { animation-delay: 0.16s; }
    .initial-load .block:nth-child(4) { animation-delay: 0.24s; }
    .initial-load .block:nth-child(5) { animation-delay: 0.32s; }
    .initial-load .block:nth-child(6) { animation-delay: 0.40s; }
    .initial-load .block:nth-child(7) { animation-delay: 0.48s; }
    .initial-load .block:nth-child(8) { animation-delay: 0.56s; }
    @keyframes blockReveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .block-info { display: flex; align-items: center; gap: 10px; }
    .block-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .block--warmup .block-dot { background: var(--accent-warmup); box-shadow: 0 0 10px var(--accent-warmup-glow); }
    .block--lift .block-dot { background: var(--accent-lift); box-shadow: 0 0 10px var(--accent-lift-glow); }
    .block--cardio .block-dot { background: var(--accent-cardio); box-shadow: 0 0 10px var(--accent-cardio-glow); }
    .block--hiit .block-dot { background: var(--accent-hiit); box-shadow: 0 0 10px var(--accent-hiit-glow); }
    .block--solo .block-dot { background: var(--accent-lift); box-shadow: 0 0 10px var(--accent-lift-glow); }
    .block-name { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .block--warmup .block-name { color: var(--accent-warmup); }
    .block--lift .block-name { color: var(--accent-lift); }
    .block--cardio .block-name { color: var(--accent-cardio); }
    .block--hiit .block-name { color: var(--accent-hiit); }
    .block--solo .block-name { color: var(--accent-lift); }
    .block-subtitle { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 2px; }
    .block-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; letter-spacing: 0.2px; }
    .block-progress { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--text-muted); background: var(--surface-2); padding: 5px 12px; border-radius: 100px; letter-spacing: 0.5px; transition: all 0.3s; }
    .block-progress.done { background: var(--green-dim); color: var(--green); box-shadow: 0 0 12px rgba(52,211,153,0.15); }
    .exercise { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; transition: all 0.25s; }
    .exercise:active { transform: scale(0.985); }
    .exercise.completed { border-color: rgba(52,211,153,0.12); background: linear-gradient(135deg, var(--surface) 0%, rgba(52,211,153,0.03) 100%); }
    .exercise-main { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; -webkit-user-select: none; user-select: none; }
    .check { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; }
    .check:active { transform: scale(0.85); }
    .check svg { width: 14px; height: 14px; stroke: transparent; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; transition: all 0.25s; }
    .exercise.completed .check { background: var(--green); border-color: var(--green); box-shadow: 0 0 16px var(--green-glow); }
    .exercise.completed .check svg { stroke: #fff; }
    .exercise-content { flex: 1; min-width: 0; }
    .exercise-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .exercise-name { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    a.exercise-name { color: var(--text); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    a.exercise-name::after { content: '▶'; font-size: 9px; color: var(--accent-lift); opacity: 0.6; }
    .exercise.completed .exercise-name { opacity: 0.4; text-decoration: line-through; text-decoration-color: rgba(52,211,153,0.3); }
    .exercise-duration { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
    .exercise-tags { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
    .tag { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; }
    .tag--warmup { background: var(--accent-warmup-dim); color: var(--accent-warmup); }
    .tag--lift { background: var(--accent-lift-dim); color: var(--accent-lift); }
    .tag--cardio { background: var(--accent-cardio-dim); color: var(--accent-cardio); }
    .tag--hiit { background: var(--accent-hiit-dim); color: var(--accent-hiit); }
    .tag--superset { background: rgba(251,191,36,0.08); color: #fbbf24; }
    .tag--norest { background: rgba(251,113,133,0.06); color: #fb7185; font-size: 8px; }
    .tag--pyramid { background: rgba(167,139,250,0.08); color: #a78bfa; font-size: 8px; }
    .expand-chevron { width: 18px; height: 18px; flex-shrink: 0; color: var(--text-muted); transition: all 0.3s; opacity: 0.5; }
    .exercise.expanded .expand-chevron { transform: rotate(180deg); opacity: 0.8; }
    .exercise-detail { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.25s ease; overflow: hidden; }
    .exercise.expanded .exercise-detail { grid-template-rows: 1fr; }
    .exercise-detail > .detail-inner { overflow: hidden; }
    .detail-inner { padding: 0 16px 16px; padding-left: 58px; display: flex; flex-direction: column; gap: 10px; }
    .load-row { display: flex; align-items: center; gap: 8px; }
    .load-label { color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .load-input { width: 72px; padding: 6px 10px; background: var(--surface-2); border: 1px solid var(--border-light); border-radius: 8px; color: var(--text); font-family: var(--font-display); font-size: 14px; font-weight: 700; text-align: center; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .load-input:focus { border-color: var(--accent-lift); box-shadow: 0 0 0 2px var(--accent-lift-dim); }
    .load-input::placeholder { color: var(--text-muted); font-weight: 400; font-size: 12px; }
    .load-unit { color: var(--text-muted); font-size: 12px; font-weight: 500; }
    .detail-row { display: flex; align-items: baseline; gap: 8px; font-size: 13px; }
    .detail-label { color: var(--text-muted); font-weight: 500; white-space: nowrap; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-value { color: var(--text-dim); font-weight: 400; font-size: 13px; }
    .rest-message { text-align: center; padding: 80px 20px; }
    .rest-message h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .rest-message p { color: var(--text-muted); font-size: 14px; }
    .session-complete { display: none; text-align: center; padding: 36px 24px; margin-top: 28px; background: linear-gradient(135deg, rgba(52,211,153,0.06) 0%, rgba(52,211,153,0.02) 100%); border: 1px solid rgba(52,211,153,0.15); border-radius: var(--radius); }
    .session-complete.visible { display: block; animation: completeReveal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes completeReveal { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .session-complete h3 { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--green); margin-bottom: 6px; }
    .session-complete p { font-size: 13px; color: var(--text-muted); }
    .footer { text-align: center; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 11px; line-height: 1.8; }
    .week-toggle, .assess-toggle { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; margin-top: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-family: var(--font-display); font-size: 13px; font-weight: 600; cursor: pointer; -webkit-appearance: none; width: 100%; transition: all 0.2s; }
    .week-toggle:active, .assess-toggle:active { transform: scale(0.98); }
    .week-toggle svg, .assess-toggle svg { width: 16px; height: 16px; transition: transform 0.3s; }
    .week-toggle.open svg, .assess-toggle.open svg { transform: rotate(180deg); }
    .week-overview, .assess-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .week-overview.open { max-height: 800px; }
    .assess-panel.open { max-height: 4000px; }
    .week-day-summary { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .week-day-summary:last-child { border-bottom: none; }
    .week-day-label { font-family: var(--font-display); font-size: 14px; font-weight: 700; width: 40px; flex-shrink: 0; }
    .week-day-desc { font-size: 12px; color: var(--text-muted); flex: 1; }
    .week-day-status { font-family: var(--font-display); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }

    .week-day-status.rest { color: var(--text-muted); opacity: 0.5; }
    .assess-section { padding: 20px 0 0; }
    .assess-section-title { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .assess-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
    .assess-basics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    .assess-basics .ab-value { font-family: var(--font-display); font-size: 22px; font-weight: 800; }
    .assess-basics .ab-unit { font-size: 12px; color: var(--text-muted); }
    .assess-basics .ab-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-top: 2px; }

    .assess-meta-row:last-child { border-bottom: none; }
    .assess-meta-label { color: var(--text-muted); font-weight: 500; }
    .assess-meta-value { color: var(--text-dim); font-weight: 600; }

    .assess-grid-item .agi-value { color: var(--text); font-family: var(--font-display); font-weight: 700; font-size: 13px; }

    .assess-stat .as-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-top: 4px; }
    .assess-donut-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
    .assess-donut { position: relative; width: 180px; height: 180px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .assess-donut::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(#f59e0b 0% var(--fat-pct), var(--green) var(--fat-pct) 100%); }

            <svg class="expand-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
          <div class="exercise-detail"><div class="detail-inner">
            ${block.type==='lift' ? `<div class="load-row" onclick="event.stopPropagation()"><span class="load-label">Carga:</span><input type="text" inputmode="decimal" class="load-input" placeholder="—" data-load-key="${key}" onchange="saveLoad(this)" value=""><span class="load-unit">kg</span></div>` : ''}
            <div class="detail-row"><span class="detail-label">Equipamento:</span><span class="detail-value">${ex.equipment}</span></div>
            <div class="detail-row"><span class="detail-label">Dica:</span><span class="detail-value">${ex.tip}</span></div>
          </div></div>
        </div>`;
      }).join('')}
    </section>`;
  }).join('');
}

function playVideo(e, url) {
  if (url.includes('1drv.ms') || url.includes('onedrive')) return;
  e.preventDefault();
  const overlay = document.getElementById('videoOverlay');
  const player = document.getElementById('videoPlayer');
  const ytPlayer = document.getElementById('ytPlayer');
  if (url.startsWith('yt:')) {
    ytPlayer.src = `https://www.youtube.com/embed/${url.slice(3)}?autoplay=1`;
    ytPlayer.style.display = 'block'; player.style.display = 'none';
  } else {
    player.src = url; player.style.display = 'block'; ytPlayer.style.display = 'none'; player.play();
  }
  overlay.classList.add('active');
}

function closeVideo() {
  const overlay = document.getElementById('videoOverlay');
  const player = document.getElementById('videoPlayer');
  const ytPlayer = document.getElementById('ytPlayer');
  player.pause(); player.src = ''; ytPlayer.src = '';
  player.style.display = 'none'; ytPlayer.style.display = 'none';
  overlay.classList.remove('active');
}

function updateProgress() {
  const day = WEEK[currentDayIndex];
  if (day.rest) { document.getElementById('progressFill').style.width='0%'; document.getElementById('progressLabel').textContent='—'; return; }
  const total = day.blocks.reduce((s,b) => s+b.exercises.length, 0);
  const done = day.blocks.reduce((s,b,bi) => s+b.exercises.filter((_,ei) => completedExercises[exerciseKey(currentDayIndex,bi,ei)]).length, 0);
  const pct = total>0 ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = pct+'%';
  const complete = document.getElementById('sessionComplete');
  pct===100 ? complete.classList.add('visible') : complete.classList.remove('visible');
}

function isDayComplete(di) {
  const d = WEEK[di]; if (d.rest||!d.blocks) return false;
  return d.blocks.every((b,bi) => b.exercises.every((_,ei) => completedExercises[exerciseKey(di,bi,ei)]));
}

function renderWeekOverview() {
  document.getElementById('weekOverview').innerHTML = WEEK.map((d,i) => {
    const cur = i===currentDayIndex;
    return `<div class="week-day-summary"><div class="week-day-label">${d.day}</div><div class="week-day-desc">${d.label}</div><div class="week-day-status ${d.rest?'rest':cur?'today':''}">${d.rest?'😴':isDayComplete(i)?'✓':cur?'Atual':d.day}</div></div>`;
  }).join('');
}

function selectDay(i) { if (WEEK[i].rest) return; currentDayIndex=i; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function toggleExercise(key) {
  completedExercises[key] ? delete completedExercises[key] : completedExercises[key]=true;
  saveProgress();
  const el = document.getElementById('ex-'+key);
  if (el) el.classList.toggle('completed', !!completedExercises[key]);
  updateBlockProgress(); updateProgress(); renderDaySwitcher();
}

function updateBlockProgress() {
  const day = WEEK[currentDayIndex]; if (day.rest) return;
  document.querySelectorAll('.block').forEach((bel,bi) => {
    const block = day.blocks[bi]; if (!block) return;
    const total = block.exercises.length;
    const done = block.exercises.filter((_,ei) => completedExercises[exerciseKey(currentDayIndex,bi,ei)]).length;
    const badge = bel.querySelector('.block-progress');
    if (badge) { badge.textContent=`${done}/${total}`; badge.classList.toggle('done', done===total); }
  });
}

function toggleDetail(key) { document.getElementById('ex-'+key).classList.toggle('expanded'); }

const LOAD_KEY = 'maxresults-rosane-loads-v1';
function loadLoads() { try { return JSON.parse(localStorage.getItem(LOAD_KEY)||'{}'); } catch { return {}; } }
function saveLoad(input) { const loads=loadLoads(); const k=input.dataset.loadKey; input.value.trim() ? loads[k]=input.value.trim() : delete loads[k]; localStorage.setItem(LOAD_KEY, JSON.stringify(loads)); }
function restoreLoads() { const loads=loadLoads(); document.querySelectorAll('.load-input').forEach(i => { const k=i.dataset.loadKey; if (loads[k]) i.value=loads[k]; }); }

document.getElementById('weekToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('weekOverview').classList.toggle('open');
  this.childNodes[0].textContent = this.classList.contains('open') ? 'Esconder semana ' : 'Ver semana completa ';
});

currentDayIndex = findCurrentDay();
render();
setTimeout(() => document.getElementById('workoutContent').classList.remove('initial-load'), 600);
