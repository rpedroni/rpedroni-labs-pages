<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@rpedroni — Links</title>
  <meta name="description" content="Links do Ricardo Pedroni — IA não é futuro, é minha terça-feira">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface-hover: #161616;
      --border: rgba(255, 255, 255, 0.05);
      --border-hover: rgba(255, 255, 255, 0.1);

      --gold: #c8a84e;
      --gold-dim: rgba(200, 168, 78, 0.12);
      --gold-glow: rgba(200, 168, 78, 0.06);

      /* Per-link accent colors */
      --instagram: #e1306c;
      --instagram-dim: rgba(225, 48, 108, 0.10);
      --personal: #d4915c;
      --personal-dim: rgba(212, 145, 92, 0.10);
      --linkedin: #5d8cb3;
      --linkedin-dim: rgba(93, 140, 179, 0.10);

      --text: #f0f0f0;
      --text-secondary: #8a8a8a;
      --text-muted: #4a4a4a;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      position: relative;
    }

    /* Subtle top ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      height: 320px;
      background: radial-gradient(ellipse, rgba(200, 168, 78, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 40px 20px 48px;
      position: relative;
    }

    /* ---- Header ---- */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .avatar {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      margin: 0 auto 20px;
      padding: 2px;
      background: linear-gradient(135deg, var(--gold), rgba(200, 168, 78, 0.3));
      box-shadow: 0 0 24px rgba(200, 168, 78, 0.12), 0 0 48px rgba(200, 168, 78, 0.04);
      position: relative;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid var(--bg);
    }

    .header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.03em;
    }

    .header .bio {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 300px;
      margin: 0 auto;
    }

    .header .bio .highlight {
      background: var(--gold-dim);
      color: var(--gold);
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ---- Links section ---- */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-muted);
      margin-top: 14px;
      margin-bottom: 0;
      padding-left: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* ---- Link button base ---- */
    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
      position: relative;
    }

    .link-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-icon {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .link-icon svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .link-text {
      flex: 1;
    }

    .link-text .title {
      display: block;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 14px;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .link-text .subtitle {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .link-arrow {
      flex-shrink: 0;
      color: var(--text-muted);
      opacity: 0.3;
      transition: all 0.2s ease;
    }

    .link-btn:hover .link-arrow {
      opacity: 0.6;
      transform: translateX(2px);
    }

    /* ---- Featured / Labs button ---- */
    .link-btn.featured {
      background: linear-gradient(135deg, rgba(200, 168, 78, 0.06), rgba(200, 168, 78, 0.02));
      border-color: rgba(200, 168, 78, 0.18);
    }

    .link-btn.featured .link-icon {
      background: var(--gold-dim);
      color: var(--gold);
    }

    .link-btn.featured .link-text .title {
      color: var(--gold);
    }

    .link-btn.featured:hover {
      border-color: rgba(200, 168, 78, 0.35);
      box-shadow: 0 4px 24px rgba(200, 168, 78, 0.08), 0 0 0 1px rgba(200, 168, 78, 0.05);
    }

    /* ---- Instagram button ---- */
    .link-btn.link-instagram .link-icon {
      background: var(--instagram-dim);
      color: var(--instagram);
    }

    .link-btn.link-instagram:hover {
      border-color: rgba(225, 48, 108, 0.2);
      background: var(--surface-hover);
    }

    .link-btn.link-instagram:hover .link-text .title {
      color: var(--instagram);
    }

    /* ---- Personal site button ---- */
    .link-btn.link-personal .link-icon {
      background: var(--personal-dim);
      color: var(--personal);
    }

    .link-btn.link-personal:hover {
      border-color: rgba(212, 145, 92, 0.2);
      background: var(--surface-hover);
    }

    .link-btn.link-personal:hover .link-text .title {
      color: var(--personal);
    }

    /* ---- LinkedIn button ---- */
    .link-btn.link-linkedin .link-icon {
      background: var(--linkedin-dim);
      color: var(--linkedin);
    }

    .link-btn.link-linkedin:hover {
      border-color: rgba(93, 140, 179, 0.2);
      background: var(--surface-hover);
    }

    .link-btn.link-linkedin:hover .link-text .title {
      color: var(--linkedin);
    }

    /* ---- Footer ---- */
    .footer {
      text-align: center;
      margin-top: 48px;
    }

    .footer .watermark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.35;
    }

    /* ---- Animations ---- */
    .initial-load .header { animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1) both; }
    .initial-load .section-label:nth-of-type(1) { animation: fadeUp 0.4s cubic-bezier(0.23, 1, 0.32, 1) 0.08s both; }
    .initial-load .link-btn:nth-of-type(1) { animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.12s both; }
    .initial-load .section-label:nth-of-type(2) { animation: fadeUp 0.4s cubic-bezier(0.23, 1, 0.32, 1) 0.18s both; }
    .initial-load .link-btn:nth-of-type(2) { animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.22s both; }
    .initial-load .link-btn:nth-of-type(3) { animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.26s both; }
    .initial-load .link-btn:nth-of-type(4) { animation: fadeUp 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.30s both; }
    .initial-load .footer { animation: fadeUp 0.4s cubic-bezier(0.23, 1, 0.32, 1) 0.36s both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="container initial-load">

    <div class="header">
      <div class="avatar">
        <img src="avatar.png" alt="Ricardo Pedroni" />
      </div>
      <h1>Ricardo Pedroni</h1>
      <p class="bio">tanta coisa quebrada...<br>bora construir as <span class="highlight">soluções</span>?</p>
    </div>

    <nav class="links">

      <span class="section-label">labs</span>

      <a class="link-btn featured" href="#" target="_blank" rel="noopener">

        </span>
        <span class="link-text">
          <span class="title">o perfil bonito</span>

        <span class="link-arrow">

        </span>
        <span class="link-text">
          <span class="title">o perfil raiz</span>
          <span class="subtitle">rpedroni.com.br</span>
        </span>
        <span class="link-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </span>
      </a>

      <a class="link-btn link-linkedin" href="https://www.linkedin.com/in/rpedroni/" target="_blank" rel="noopener">
        <span class="link-icon">
          <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

        <span class="link-text">
          <span class="title">o perfil de gravata</span>

        <span class="link-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>

    </nav>

    <footer class="footer">
      <span class="watermark">@rpedroni</span>
    </footer>

  </main>

  <script>
    setTimeout(() => {
      document.querySelector('.initial-load')?.classList.remove('initial-load');
    }, 800);
  </script>
</body>
</html>
